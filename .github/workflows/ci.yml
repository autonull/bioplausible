name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --dev
      - name: Check Formatting (Ruff)
        run: uv run ruff format --check .
      - name: Lint (Ruff)
        run: uv run ruff check .
      - name: Type Check (Pyright)
        run: uv run pyright .
      - name: Test with Coverage
        run: uv run pytest --cov=bioplausible --cov-report=term-missing --cov-fail-under=85
      - name: Dependency Scan (pip-audit)
        run: uv run pip-audit

  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"
    - name: Install dependencies
      run: uv sync --dev
    - name: Run Verification Smoke Test
      run: |
        uv run eqprop-verify --quick
    - name: Run Full Test Suite
      run: |
        uv run pytest tests/ -v --cov=bioplausible --cov-report=term-missing --cov-fail-under=85

  build-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install build tools
        run: uv sync --only-dev
      - name: Build Package
        run: uv run python -m build
      - name: Verify Artifacts
        run: ls -l dist/
