name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install Linting Tools
        run: pip install black flake8 isort
      - name: Check Formatting (Black)
        run: black --check bioplausible bioplausible_ui
      - name: Check Imports (Isort)
        run: isort --check-only bioplausible bioplausible_ui
      - name: Linting (Flake8)
        run: flake8 bioplausible bioplausible_ui --select=E9,F63,F7,F82

  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Run Verification Smoke Test
      run: |
        eqprop-verify --quick

    - name: Run Full Test Suite
      run: |
        pytest tests/ -v

  build-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install Build Tools
        run: pip install build
      - name: Build Package
        run: python -m build
      - name: Verify Artifacts
        run: ls -l dist/
