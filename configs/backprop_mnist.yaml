# Baseline Backprop on MNIST
seed: 42
device: "auto"
output_dir: "results/${now:%Y%m%d_%H%M%S}_backprop_mnist"

data:
  task: "mnist"
  batch_size: 64
  augment: false

model:
  name: "backprop_mlp"
  hidden_dim: 512
  num_layers: 2

optimizer:
  name: "adam"
  lr: 0.001
  weight_decay: 0.0

trainer:
  epochs: 5
  batches_per_epoch: 200
  use_compile: true
  track_energy: true
